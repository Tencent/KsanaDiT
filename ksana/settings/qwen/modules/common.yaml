
sample_config:
  steps: 50
  solver: "flowmatch_euler"
  cfg_scale: 4
  num_train_timesteps: 1000

  # for calculate_shift
  base_seq_len: 256
  max_seq_len : 4096
  base_shift: 0.5
  max_shift: 1.15

scheduler_subdir: "scheduler"

diffusion:
  transformer_subdir: "transformer"
  num_heads: 24
  patch_size: 2

runtime_config:
  target_size: [1024, 1024]
  param_dtype: ${torch_dtype:bfloat16}
